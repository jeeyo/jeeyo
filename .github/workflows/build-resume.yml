name: Build Resume

on:
  push:
    branches: [main]
    paths:
      - resume.yml
  pull_request:
    branches: [main]
    paths:
      - resume.yml
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build resume
        id: build
        uses: yamlresume/action@v0.2.2
        with:
          resumes: resume.yml
          verbose: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: resume
          path: "resume.*"
          retention-days: 90
